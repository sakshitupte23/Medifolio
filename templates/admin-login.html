<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFolio - Medical Records Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.5;
            }

            100% {
                transform: scale(0.8);
                opacity: 1;
            }
        }

        .fingerprint-scan {
            animation: pulse-ring 2s infinite;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

    <!-- Login Screen -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 fade-in">
            <div class="text-center mb-8">
                <div
                    class="w-20 h-20 flex items-center justify-center mx-auto mb-4 bg-gradient-to-r from-blue-600 to-indigo-600 p-2 rounded-lg">
                    <i class="fas fa-heartbeat text-white text-5xl "></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">MediFolio</h1>
                <p class="text-gray-600 mt-2">Secure Medical Records System</p>
            </div>

            <div class="space-y-6">

                <div id="fingerprintArea"
                    class="bg-indigo-50 rounded-xl p-8 text-center cursor-pointer hover:bg-indigo-100 transition-colors"
                    onclick="startAdminLogin()">
                    <svg id="fingerprintIcon" class="w-24 h-24 text-indigo-600 mx-auto fingerprint-scan" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4">
                        </path>
                    </svg>
                    <p class="text-indigo-700 font-semibold mt-4" id="scanText">Place finger to login</p>
                    <p class="text-sm text-gray-500 mt-2">Admin Authentication</p>
                </div>

                <button onclick="startValidate()"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
                    Login
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>

    <!-- Script -->
    <script>
        checkAuth("/");
        let currentTask = null;

        async function pollTask() {
            if (!currentTask) return;

            let res = await fetch("/task/" + currentTask);
            let data = await res.json();

            // document.getElementById("log").textContent =
            //     JSON.stringify(data, null, 2);

            console.log(JSON.stringify(data, null, 2));


            if (data.status === "place_finger" || data.status === "place_finger_1" || data.status === "place_finger_2") {

                document.getElementById("scanText").innerText = "place your finger...";
                // scanFingerprint();
            }

            if (data.status === "matched") {
                document.getElementById("scanText").innerText = "Authenticated!";
                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("AdminName",data.user.name);
                // Redirect to admin dashboard after a short delay
                setTimeout(() => {
                    window.location.href = "/";
                }, 1000);
                return;
            }
            if (data.status === "unauthorized") {
                document.getElementById("scanText").innerText = "Unauthorized User!";
                return;
                }

            if (data.status === "done" || data.status === "error" || data.status === "matched" || data.status === "nomatch" || data.status === "mismatch" || data.status === "exists") {
                document.getElementById("scanText").innerText = data.status;
                // closeFingerprintModal()
                return;
            }

            setTimeout(pollTask, 1000);
        }

        async function startValidate() {
            let res = await fetch("/validate_admin");
            let data = await res.json();
            currentTask = data.task_id;
            pollTask();
        }

        // function simulateLogin() {

        //     // Start animation
        //     fingerprint.style.animation = "pulse-ring 2s infinite";

        //     // Optional: update text

        //     // Optional: stop after 3 seconds
        //     setTimeout(() => {
        //         fingerprint.style.animation = "none";
        //         scanText.textContent = "Authenticated!";
        //     }, 3000);
        // }
    </script>

</body>

</html>
